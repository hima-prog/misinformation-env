name: misinformation-detector
version: "1.0.0"
description: >
  A real-world environment where an AI agent detects, analyzes,
  and corrects misinformation in news articles and social media claims.
  Simulates tasks performed by human fact-checkers at newsrooms and
  social media platforms daily.
author: your-name-here
tags:
  - fact-checking
  - content-moderation
  - nlp
  - real-world
tasks:
  - id: task_1_classify
    name: Claim Classification
    difficulty: easy
    description: >
      Given a short news claim, classify it as REAL, FAKE, or UNCLEAR.
      Score 1.0 for correct label, 0.0 for wrong.
  - id: task_2_locate
    name: False Detail Locator
    difficulty: medium
    description: >
      Given a paragraph with exactly one false sentence, identify
      which sentence is false. Partial credit for near-correct answers.
  - id: task_3_correct
    name: Article Correction
    difficulty: hard
    description: >
      Given a manipulated news article with multiple false claims,
      rewrite it with all claims corrected. Scored 0.0-1.0 on
      how many claims were fixed accurately.
action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: [classify, locate, correct]
    content:
      type: string
observation_space:
  type: object
  properties:
    task_id:
      type: string
    text:
      type: string
    instruction:
      type: string
    step:
      type: integer
    done:
      type: boolean