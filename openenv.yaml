name: misinformation-detector
version: "1.0.0"
description: >
  A real-world environment where an AI agent detects and corrects
  misinformation in news articles and social media claims.
author: Harshi-prog
tags:
  - openenv
  - fact-checking
  - content-moderation
  - nlp
entrypoint: server:app
port: 7860
tasks:
  - id: task_1_classify
    name: Claim Classification
    difficulty: easy
    description: >
      Given a short news claim, classify it as REAL, FAKE, or UNCLEAR.
  - id: task_2_locate
    name: False Detail Locator
    difficulty: medium
    description: >
      Given a paragraph with exactly one false sentence, identify it.
  - id: task_3_correct
    name: Article Correction
    difficulty: hard
    description: >
      Given a manipulated news article, rewrite it with all false
      claims corrected.
endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
